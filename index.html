<!DOCTYPE html>  
<html>  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Security Alert</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; }  
        body {  
            background: #f2f2f7;  
            min-height: 100vh;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            font-family: -apple-system, 'Helvetica Neue', sans-serif;  
        }  
        .alert {  
            width: 87%;  
            max-width: 290px;  
            background: #fff;  
            border-radius: 14px;  
            overflow: hidden;  
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);  
            animation: fadeIn 0.3s ease;  
        }  
        @keyframes fadeIn {  
            0% { opacity: 0; transform: scale(0.95); }  
            100% { opacity: 1; transform: scale(1); }  
        }  
        .content {  
            padding: 28px 22px 10px;  
            text-align: center;  
        }  
        .icon {  
            width: 50px;  
            height: 50px;  
            background: #FF3B30;  
            border-radius: 50%;  
            display: flex;  
            align-items: center;  
            justify-content: center;  
            margin: 0 auto 14px;  
        }  
        .icon svg { width: 28px; height: 28px; fill: white; }  
        h2 {  
            font-size: 18px;  
            font-weight: 700;  
            color: #1C1C1E;  
            margin-bottom: 8px;  
        }  
        p {  
            font-size: 13.5px;  
            line-height: 1.5;  
            color: #3A3A3C;  
            margin-bottom: 14px;  
        }  
        .phone-box {  
            background: #f8f8f8;  
            border-radius: 10px;  
            padding: 12px;  
            margin: 0 0 10px;  
        }  
        .phone-box .label {  
            font-size: 12px;  
            color: #8E8E93;  
            font-weight: 500;  
            margin-bottom: 2px;  
        }  
        .phone-box .number {  
            font-size: 20px;  
            font-weight: 700;  
            color: #1C1C1E;  
        }  
        .divider {  
            height: 0.5px;  
            background: rgba(60,60,67,0.15);  
            margin: 6px 0 0;  
        }  
        .ok-btn {  
            width: 100%;  
            padding: 14px 0;  
            border: none;  
            background: white;  
            color: #007AFF;  
            font-size: 17px;  
            font-weight: 600;  
            cursor: pointer;  
            font-family: inherit;  
            letter-spacing: 0.5px;  
            transition: background 0.1s;  
        }  
        .ok-btn:hover {  
            background: #f2f2f7;  
        }  
        .ok-btn:active {  
            background: #e5e5ea;  
        }  
    </style>  
</head>  
<body>  
    <div class="alert">  
        <div class="content">  
            <div class="icon">

            </div>  
            <h2>Security Alert</h2>
